name: comparable_version_sync
description: Compare and merge JSON or SQLite versions with a configurable Flutter diff/merge widget.
version: 1.0.2+5
homepage: https://github.com/your-org/comparable_version_sync

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ">=1.17.0 <3.0.0"
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
