name: comparable_version_sync
description: >-
  A Flutter package providing a GUI widget to compare two versions of JSON or
  SQLite files side-by-side, with git-conflict-style merge resolution.
  Fully configurable via ComparableVersionTheme — every dimension, colour, and
  animation parameter can be overridden.
version: 1.0.2+3
homepage: https://github.com/your-org/comparable_version_sync

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ">=1.17.0 <3.0.0"
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
