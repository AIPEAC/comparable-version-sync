name: comparable_version_sync
description: Compare and merge JSON or SQLite versions with a configurable Flutter diff/merge widget.
version: 1.1.0+0
homepage: https://github.com/AIPEAC/comparable-version-sync

environment:
  sdk: ">=3.5.0 <4.0.0"

platforms:
  android:
  ios:
  windows:
  linux:
  macos:

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
